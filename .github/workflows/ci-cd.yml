name: CI/CD Pipeline

on:
  workflow_dispatch:
#  push:
#    branches: [ main ]
#  pull_request:
#    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4 # Updated to v4 for better support

    # Step 1: Set up QEMU for multi-platform support
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    # Step 2: Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
    
    - name: Login to GitHub Container Registry
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64  # <--- Added platforms here
        tags: |
          ${{ secrets.DOCKER_HUB_USERNAME }}/mereheze-wiki-contributor:latest
          ${{ secrets.DOCKER_HUB_USERNAME }}/mereheze-wiki-contributor:${{ github.sha }}
    
    - name: Build and push to GitHub Container Registry
      if: github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64  # <--- Added platforms here
        tags: |
          ghcr.io/${{ github.repository_owner }}/mereheze-wiki-contributor:latest
          ghcr.io/${{ github.repository_owner }}/mereheze-wiki-contributor:${{ github.sha }}

    - name: Update Docker Hub Description
      uses: peter-evans/dockerhub-description@v4
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
        repository: danutzzzzz/mereheze-wiki-contributor
        short-description: ${{ github.event.repository.description }}