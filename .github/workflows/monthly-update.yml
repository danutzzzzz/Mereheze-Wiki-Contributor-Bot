name: Monthly Base Image Update

on:
  schedule:
    - cron: '0 0 1 * *'  # First day of each month at midnight
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # Required for multi-architecture builds (AMD64 + ARM64)
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    # Required to use the 'platforms' feature in build-push-action
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    #- name: Docker metadata
      #id: meta
      #uses: docker/metadata-action@v5
      #with:
        #images: ghcr.io/${{ github.repository_owner }}/mereheze-wiki-contributor
        #tags: |
          #type=raw,value=latest,enable={{is_default}} # Only tag 'latest' on the main branch
          #type=sha
          #type=ref,event=tag,enable=true,prefix= # Adds the Git tag (e.g., v1.1)
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push with updated base image
      uses: docker/build-push-action@v6
      with:
        context: .
        # Added linux/arm64 to support your aarch64 environment
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ secrets.DOCKER_HUB_USERNAME }}/mereheze-wiki-contributor:latest
          ${{ secrets.DOCKER_HUB_USERNAME }}/mereheze-wiki-contributor:${{ github.sha }}
          ghcr.io/${{ github.repository_owner }}/mereheze-wiki-contributor:latest
          ghcr.io/${{ github.repository_owner }}/mereheze-wiki-contributor:${{ github.sha }}

    - name: Update Docker Hub Description
      uses: peter-evans/dockerhub-description@v4
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
        repository: danutzzzzz/mereheze-wiki-contributor
        short-description: ${{ github.event.repository.description }}
